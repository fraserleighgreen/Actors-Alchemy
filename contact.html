<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Actors Alchemy</title>
  <meta name="description" content="Contact Actors Alchemy for one-to-one musical theatre coaching with Fraser Leigh Green.">
  <link rel="icon" href="assets/actors-alchemy-icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="wordmark" href="index.html#top" aria-label="Actors Alchemy home">
      <img class="wordmark-icon" src="assets/actors-alchemy-icon.svg" alt="" aria-hidden="true">
      <span>Actors</span>
      <span>Alchemy</span>
    </a>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span></span>
      <span></span>
    </button>
    <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
      <a href="index.html#top">Home</a>
      <a href="index.html#testimonials">Testimonials</a>
      <a href="fraser.html">About</a>
      <a class="is-active" href="contact.html">Contact</a>
      <a class="mobile-nav-cta" href="index.html#booking">Book a Session</a>
    </nav>
    <a class="button button-primary header-cta" href="index.html#booking">Book a Session</a>
  </header>

  <main class="contact-page-main" id="top">
    <section class="section contact-section" aria-labelledby="contact-title">
      <div class="container contact-grid">
        <div>
          <h1 id="contact-title">Start the conversation.</h1>
        </div>

        <div class="contact-card">
          <div class="contact-item">
            <span>Email</span>
            <a href="mailto:fraser@actorsalchemy.co.uk">fraser@actorsalchemy.co.uk</a>
          </div>
          <div class="contact-item">
            <span>Instagram</span>
            <a class="social-link" href="https://www.instagram.com/actors.alchemy?igsh=MXBpcXM1bGhld2JzeA==" aria-label="Actors Alchemy on Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                <circle cx="12" cy="12" r="4"></circle>
                <circle cx="17" cy="7" r="1"></circle>
              </svg>
              <span>@actors.alchemy</span>
            </a>
          </div>
        </div>
      </div>
      <p class="process-note process-note-about">what would you like to work on?</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <a class="wordmark wordmark-light" href="index.html#top">
        <img class="wordmark-icon" src="assets/actors-alchemy-icon.svg" alt="" aria-hidden="true">
        <span>Actors</span>
        <span>Alchemy</span>
      </a>
      <div class="footer-contact">
        <div class="footer-links" aria-label="Contact links">
          <a href="mailto:fraser@actorsalchemy.co.uk">fraser@actorsalchemy.co.uk</a>
          <a class="social-link" href="https://www.instagram.com/actors.alchemy?igsh=MXBpcXM1bGhld2JzeA==" aria-label="Actors Alchemy on Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17" cy="7" r="1"></circle>
            </svg>
            <span>Instagram</span>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
